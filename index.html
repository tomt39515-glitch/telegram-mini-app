<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityPass</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fb;
}
.header{
  background:#2563eb;
  color:#fff;
  padding:24px;
  border-radius:0 0 24px 24px;
}
.card{
  background:#fff;
  margin:16px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  font-size:16px;
}
#qr{
  font-size:28px;
  font-weight:bold;
  word-break:break-all;
  margin-top:16px;
}
.small{
  font-size:13px;
  color:#666;
}
</style>
</head>
<body>

<div class="header">
  <h1>CityPass</h1>
  <p>Скидки от партнёров</p>
</div>

<div class="card">
  <h3>☕ Arabica Coffee</h3>
  <p>Скидка 5%</p>
  <button onclick="activateDiscount()">Активировать скидку</button>
</div>

<div class="card">
  <h3>👤 Профиль</h3>
  <p id="username">Гость</p>
</div>

<div class="card" id="result" style="display:none;">
  <h3>Покажите код сотруднику</h3>
  <div id="qr"></div>
  <p class="small">Активация записана в систему</p>
</div>

<script>
const SUPABASE_URL = 'https://doswzyuumcwxjmltcgeh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5_sw0Rk7sPg-SMTgI1aTkA_Vb5QAZRP';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tgUser = null;

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.expand();
  tgUser = Telegram.WebApp.initDataUnsafe.user || null;

  document.getElementById('username').innerText =
    tgUser?.first_name || 'Пользователь';
}

function generateToken() {
  return 'CP-' + Math.random().toString(36).substring(2,10).toUpperCase();
}

async function activateDiscount() {
  const token = generateToken();

  const payload = {
    telegram_user_id: String(tgUser?.id || 'unknown'),
    telegram_name: tgUser?.first_name || 'Guest',
    partner_name: 'Arabica Coffee',
    token: token,
    discount_percent: 5,
    status: 'active'
  };

  const { error } = await supabase
    .from('redemptions')
    .insert([payload]);

  if (error) {
    alert('Ошибка: ' + error.message);
    return;
  }

  document.getElementById('qr').innerText = token;
  document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
