<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityPass</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
.header{background:#2563eb;color:#fff;padding:24px;border-radius:0 0 24px 24px}
.card{background:#fff;margin:16px;padding:16px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:16px}
#qr{font-size:22px;font-weight:bold;word-break:break-all}
</style>
</head>
<body>

<div class="header">
<h1>CityPass</h1>
<p>Скидки от партнёров</p>
</div>

<div class="card">
<h3>☕ Arabica Coffee</h3>
<p>Скидка 5%</p>
<button onclick="activate()">Активировать скидку</button>
</div>

<div class="card">
<h3>👤 Профиль</h3>
<p id="user">Гость</p>
</div>

<div class="card" id="qrbox" style="display:none">
<h3>Покажите QR сотруднику</h3>
<p id="qr"></p>
</div>

<script>
if(window.Telegram&&Telegram.WebApp){
 Telegram.WebApp.expand();
 document.getElementById('user').innerText=
 Telegram.WebApp.initDataUnsafe.user?.first_name||'Пользователь';
}

function activate(){
 let token='CP-'+Math.random().toString(36).substring(2,10).toUpperCase();
 document.getElementById('qr').innerText=token;
 document.getElementById('qrbox').style.display='block';
}
</script>

</body>
</html>
